{% extends 'web/base.html' %}
{% load static %}

{% block content %}

<section class="inscripcion-exitosa-container">

    <div class="card-exito">

        <div class="icono-exito">✔</div>

        <h1>Inscripción enviada correctamente</h1>

        <p class="curso-nombre">
            Curso: <strong>{{ curso.nombre }}</strong>
        </p>

        <p>
            Hemos recibido tu inscripción y el comprobante de pago.
        </p>

        <p>
            Nuestro equipo revisará la información y te notificará a la brevedad.
        </p>

        <a href="{% url 'cursos' %}" class="btn-volver">
            Volver a cursos
        </a>

    </div>

</section>

{% endblock %}
